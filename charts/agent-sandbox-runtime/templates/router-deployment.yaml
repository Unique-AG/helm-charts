{{- if .Values.router.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sandbox.router.name" . }}-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sandbox.router.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.router.replicaCount }}
  selector:
    matchLabels:
      {{- include "sandbox.router.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sandbox.router.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.router.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.router.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.router.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.router.topologySpreadConstraints.topologyKey }}
          whenUnsatisfiable: {{ .Values.router.topologySpreadConstraints.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "sandbox.router.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: router
          image: "{{ .Values.router.image.repository }}:{{ .Values.router.image.tag }}"
          imagePullPolicy: {{ .Values.router.image.pullPolicy }}
          env:
            - name: PROXY_TIMEOUT_SECONDS
              value: {{ .Values.router.proxyTimeoutSeconds | default 180 | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.router.containerPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: {{ .Values.router.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.router.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.router.readinessProbe.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.router.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.router.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.router.livenessProbe.periodSeconds }}
          {{- with .Values.router.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.router.resources | nindent 12 }}
{{- end }}
