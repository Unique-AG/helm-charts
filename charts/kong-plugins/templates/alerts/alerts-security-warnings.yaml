{{- if and .Values.prometheus .Values.prometheus.defaultAlerts .Values.prometheus.defaultAlerts.securityWarnings .Values.prometheus.defaultAlerts.securityWarnings.enabled .Values.prometheus.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
{{- $fullName := include "kongPlugins.fullname" . -}}
{{- $labels := include "kongPlugins.labels" . -}}
{{- $jwtMetric := .Values.prometheus.defaultAlerts.securityWarnings.jwtAuthMetricName -}}
{{- $appRepoMetric := .Values.prometheus.defaultAlerts.securityWarnings.appRepoAuthMetricName -}}
{{- $rules := .Values.prometheus.defaultAlerts.securityWarnings.rules | default dict -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ $fullName }}-security-warnings-alerts
  labels:
    {{- $labels | nindent 4 }}
    role: alert-rules
    alertGroup: security-warnings
    {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: {{ $fullName }}-jwt-auth-security-warnings
      rules:
{{- if dig "KongJwtAuthInvalidSignature" "enabled" true $rules }}
      - alert: KongJwtAuthInvalidSignature
        expr: |
          increase({{ $jwtMetric }}{reason="invalid_signature"}[{{ dig "KongJwtAuthInvalidSignature" "interval" "5m" $rules }}]) > {{ dig "KongJwtAuthInvalidSignature" "threshold" 2 $rules }}
        for: {{ dig "KongJwtAuthInvalidSignature" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongJwtAuthInvalidSignature" "severity" "critical" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong JWT auth rejected a token with an invalid signature"
          description: "A JWT was rejected because its signature could not be verified against any known key for the issuer."
{{- end }}
{{- if dig "KongJwtAuthDisallowedIssuer" "enabled" true $rules }}
      - alert: KongJwtAuthDisallowedIssuer
        expr: |
          increase({{ $jwtMetric }}{reason="disallowed_issuer"}[{{ dig "KongJwtAuthDisallowedIssuer" "interval" "5m" $rules }}]) > {{ dig "KongJwtAuthDisallowedIssuer" "threshold" 2 $rules }}
        for: {{ dig "KongJwtAuthDisallowedIssuer" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongJwtAuthDisallowedIssuer" "severity" "critical" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong JWT auth rejected a token from a disallowed issuer"
          description: "A JWT was rejected because its 'iss' claim does not match any entry in allowed_iss."
{{- end }}
{{- if dig "KongJwtAuthUnexpectedAlgorithm" "enabled" true $rules }}
      - alert: KongJwtAuthUnexpectedAlgorithm
        expr: |
          increase({{ $jwtMetric }}{reason="unexpected_algorithm"}[{{ dig "KongJwtAuthUnexpectedAlgorithm" "interval" "5m" $rules }}]) > {{ dig "KongJwtAuthUnexpectedAlgorithm" "threshold" 2 $rules }}
        for: {{ dig "KongJwtAuthUnexpectedAlgorithm" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongJwtAuthUnexpectedAlgorithm" "severity" "critical" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong JWT auth rejected a token with an unexpected algorithm"
          description: "A JWT was rejected because its 'alg' header does not match the configured algorithm."
{{- end }}
{{- if dig "KongJwtAuthMalformedJwt" "enabled" true $rules }}
      - alert: KongJwtAuthMalformedJwt
        expr: |
          increase({{ $jwtMetric }}{reason="malformed_jwt"}[{{ dig "KongJwtAuthMalformedJwt" "interval" "5m" $rules }}]) > {{ dig "KongJwtAuthMalformedJwt" "threshold" 2 $rules }}
        for: {{ dig "KongJwtAuthMalformedJwt" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongJwtAuthMalformedJwt" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong JWT auth received a malformed token"
          description: "A request contained a token that could not be decoded as a valid JWT."
{{- end }}
{{- if dig "KongJwtAuthMultipleTokens" "enabled" true $rules }}
      - alert: KongJwtAuthMultipleTokens
        expr: |
          increase({{ $jwtMetric }}{reason="multiple_tokens"}[{{ dig "KongJwtAuthMultipleTokens" "interval" "5m" $rules }}]) > {{ dig "KongJwtAuthMultipleTokens" "threshold" 2 $rules }}
        for: {{ dig "KongJwtAuthMultipleTokens" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongJwtAuthMultipleTokens" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong JWT auth received a request with multiple tokens"
          description: "A request was rejected because it contained more than one token."
{{- end }}
{{- if dig "KongJwtAuthUnrecognizableTokenType" "enabled" true $rules }}
      - alert: KongJwtAuthUnrecognizableTokenType
        expr: |
          increase({{ $jwtMetric }}{reason="unrecognizable_token_type"}[{{ dig "KongJwtAuthUnrecognizableTokenType" "interval" "5m" $rules }}]) > {{ dig "KongJwtAuthUnrecognizableTokenType" "threshold" 2 $rules }}
        for: {{ dig "KongJwtAuthUnrecognizableTokenType" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongJwtAuthUnrecognizableTokenType" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong JWT auth received a token of an unrecognizable type"
          description: "A request was rejected because the token was neither a string nor a table."
{{- end }}
{{- if dig "KongJwtAuthClaimsValidationFailed" "enabled" false $rules }}
      - alert: KongJwtAuthClaimsValidationFailed
        expr: |
          increase({{ $jwtMetric }}{reason="claims_validation_failed"}[{{ dig "KongJwtAuthClaimsValidationFailed" "interval" "5m" $rules }}]) > {{ dig "KongJwtAuthClaimsValidationFailed" "threshold" 2 $rules }}
        for: {{ dig "KongJwtAuthClaimsValidationFailed" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongJwtAuthClaimsValidationFailed" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong JWT auth rejected tokens with failed claims validation"
          description: "Tokens were rejected because a registered claim other than exp (e.g. nbf) failed verification. For expired tokens see reason=token_expired."
{{- end }}
{{- if dig "KongJwtAuthTokenExpired" "enabled" false $rules }}
      - alert: KongJwtAuthTokenExpired
        expr: |
          increase({{ $jwtMetric }}{reason="token_expired"}[{{ dig "KongJwtAuthTokenExpired" "interval" "5m" $rules }}]) > {{ dig "KongJwtAuthTokenExpired" "threshold" 2 $rules }}
        for: {{ dig "KongJwtAuthTokenExpired" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongJwtAuthTokenExpired" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong JWT auth rejected expired tokens"
          description: "Tokens were rejected because the exp claim indicated the token has expired. This is normal (e.g. user returned after session expiry); enable this alert only if you want visibility into expiry volume."
{{- end }}
{{- if dig "KongJwtAuthMaxExpirationExceeded" "enabled" false $rules }}
      - alert: KongJwtAuthMaxExpirationExceeded
        expr: |
          increase({{ $jwtMetric }}{reason="max_expiration_exceeded"}[{{ dig "KongJwtAuthMaxExpirationExceeded" "interval" "5m" $rules }}]) > {{ dig "KongJwtAuthMaxExpirationExceeded" "threshold" 2 $rules }}
        for: {{ dig "KongJwtAuthMaxExpirationExceeded" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongJwtAuthMaxExpirationExceeded" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong JWT auth rejected tokens exceeding maximum expiration"
          description: "Tokens were rejected because their lifetime exceeds the configured maximum_expiration. This may indicate clients issuing overly long-lived tokens."
{{- end }}

    - name: {{ $fullName }}-app-repo-auth-security-warnings
      rules:
{{- if dig "KongAppRepoAuthApiKeyValidationFailed" "enabled" true $rules }}
      - alert: KongAppRepoAuthApiKeyValidationFailed
        expr: |
          increase({{ $appRepoMetric }}{reason="api_key_validation_failed"}[{{ dig "KongAppRepoAuthApiKeyValidationFailed" "interval" "5m" $rules }}]) > {{ dig "KongAppRepoAuthApiKeyValidationFailed" "threshold" 50 $rules }}
        for: {{ dig "KongAppRepoAuthApiKeyValidationFailed" "for" "5m" $rules }}
        labels:
          severity: {{ dig "KongAppRepoAuthApiKeyValidationFailed" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong app-repo auth received an invalid API key"
          description: "The app repository returned a non-200 response when validating an API key."
{{- end }}
{{- if dig "KongAppRepoAuthMultipleTokens" "enabled" true $rules }}
      - alert: KongAppRepoAuthMultipleTokens
        expr: |
          increase({{ $appRepoMetric }}{reason="multiple_tokens"}[{{ dig "KongAppRepoAuthMultipleTokens" "interval" "5m" $rules }}]) > {{ dig "KongAppRepoAuthMultipleTokens" "threshold" 2 $rules }}
        for: {{ dig "KongAppRepoAuthMultipleTokens" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongAppRepoAuthMultipleTokens" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong app-repo auth received a request with multiple tokens"
          description: "A request was rejected because it contained more than one token."
{{- end }}
{{- if dig "KongAppRepoAuthUnrecognizableTokenType" "enabled" true $rules }}
      - alert: KongAppRepoAuthUnrecognizableTokenType
        expr: |
          increase({{ $appRepoMetric }}{reason="unrecognizable_token_type"}[{{ dig "KongAppRepoAuthUnrecognizableTokenType" "interval" "5m" $rules }}]) > {{ dig "KongAppRepoAuthUnrecognizableTokenType" "threshold" 2 $rules }}
        for: {{ dig "KongAppRepoAuthUnrecognizableTokenType" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongAppRepoAuthUnrecognizableTokenType" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong app-repo auth received a token of an unrecognizable type"
          description: "A request was rejected because the token was neither a string nor a table."
{{- end }}
{{- if dig "KongAppRepoAuthMissingRequiredHeaders" "enabled" true $rules }}
      - alert: KongAppRepoAuthMissingRequiredHeaders
        expr: |
          increase({{ $appRepoMetric }}{reason="missing_required_headers"}[{{ dig "KongAppRepoAuthMissingRequiredHeaders" "interval" "5m" $rules }}]) > {{ dig "KongAppRepoAuthMissingRequiredHeaders" "threshold" 2 $rules }}
        for: {{ dig "KongAppRepoAuthMissingRequiredHeaders" "for" "0m" $rules }}
        labels:
          severity: {{ dig "KongAppRepoAuthMissingRequiredHeaders" "severity" "warning" $rules }}
          alertGroup: security-warnings
          {{- with .Values.prometheus.defaultAlerts.securityWarnings.additionalLabels }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        annotations:
          summary: "Kong app-repo auth received a request missing required headers"
          description: "A request was rejected because x-app-id or x-company-id header was absent."
{{- end }}
{{- end }}
