# Default values for kong-plugins.

# -- List of plugins to be installed


# -- jwtAuth enables the jwt-auth plugin
jwtAuth:
  # -- The name of the jwt auth config map
  name: kong-plugin-unique-jwt-auth

# -- appRepoAuth enables the app-repo-auth plugin
appRepoAuth:
  # -- The name of the app repository auth config map
  name: kong-plugin-unique-app-repo-auth
  # -- The default app repository url
  appRepositoryUrl: "http://service-app-repository.default.svc:8088"

prometheus:
  # -- Enable Prometheus integration. When false no PrometheusRule resources are rendered.
  enabled: true
  defaultAlerts:
    # -- securityWarnings alerts fire on the counters emitted by the kong plugins for each WARN-level security rejection.
    securityWarnings:
      # -- Enable the security warnings alert group. Requires monitoring.coreos.com/v1 CRDs.
      enabled: true
      # -- Base metric name (without kong_ prefix) used in PromQL for the jwt-auth plugin. Must match config.security_warning_metric_name on the KongClusterPlugin.
      jwtAuthMetricName: kong_unique_jwt_auth_security_warnings_total
      # -- Base metric name (without kong_ prefix) used in PromQL for the app-repo-auth plugin. Must match config.security_warning_metric_name on the KongClusterPlugin.
      appRepoAuthMetricName: kong_unique_app_repo_auth_security_warnings_total
      # -- Disable individual alerts by name. Expiration-related alerts are disabled by default as token expiry is a normal operational event.
      disabled:
        KongJwtAuthClaimsValidationFailed: true
        KongJwtAuthMaxExpirationExceeded: true
        # KongJwtAuthInvalidSignature: true
        # KongJwtAuthDisallowedIssuer: true
        # KongJwtAuthUnexpectedAlgorithm: true
        # KongJwtAuthMalformedJwt: true
        # KongJwtAuthMultipleTokens: true
        # KongJwtAuthUnrecognizableTokenType: true
        # KongAppRepoAuthApiKeyValidationFailed: true
        # KongAppRepoAuthMultipleTokens: true
        # KongAppRepoAuthUnrecognizableTokenType: true
        # KongAppRepoAuthMissingRequiredHeaders: true
      # -- Override for and severity per alert.
      customRules: {}
        # KongJwtAuthDisallowedIssuer:
        #   for: "1m"
        #   severity: "critical"
        # KongJwtAuthInvalidSignature:
        #   for: "5m"
        #   severity: "critical"
      # -- Extra labels added to the PrometheusRule metadata and each alert's labels.
      additionalLabels: {}
