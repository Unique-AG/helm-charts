apiVersion: v2
type: application
icon: https://www.unique.ch/hubfs/unique_assets/favicon/glyph_caumasee.svg
maintainers:
  - name: unique-ag
    url: https://unique.ch/
name: kong-plugins
version: 2.0.0
description: |
  The 'kong-plugins' chart provides a streamlined solution for deploying Kong plugins via ConfigMaps to be used with the Unique Software.

  Refer to each plugins readme section to learn more about them.

  Please report any security concerns with the plugins via the [Security Policy](https://github.com/Unique-AG/helm-charts/tree/main?tab=security-ov-file).
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: Use strict issuer matching for JWT validation
    - kind: changed
      description: Enable nbf claim verification by default
    - kind: changed
      description: Enforce TLS verification on OIDC discovery requests
    - kind: fixed
      description: Handle unsupported key types in JWKS responses gracefully
    - kind: fixed
      description: Reduce sensitive information in debug logs and error messages
    - kind: changed
      description: Set upstream headers only after successful consumer matching
