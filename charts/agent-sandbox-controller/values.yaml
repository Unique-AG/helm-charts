image:
  repository: registry.k8s.io/agent-sandbox/agent-sandbox-controller
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

extensions:
  enabled: true

leaderElect: true

service:
  port: 8080

resources: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL

nodeSelector: {}

tolerations: []

affinity: {}
