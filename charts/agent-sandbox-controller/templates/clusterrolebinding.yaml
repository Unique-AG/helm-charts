apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agent-sandbox.fullname" . }}
  labels:
    {{- include "agent-sandbox.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "agent-sandbox.fullname" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "agent-sandbox.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- if .Values.extensions.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agent-sandbox.fullname" . }}-extensions
  labels:
    {{- include "agent-sandbox.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "agent-sandbox.fullname" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "agent-sandbox.fullname" . }}-extensions
  apiGroup: rbac.authorization.k8s.io
{{- end }}
