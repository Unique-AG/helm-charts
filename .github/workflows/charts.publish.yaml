name: "[charts] Publish"
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'unique-ag/helm-charts'
    permissions:
      contents: read # for checkout and git diff
      packages: write # to push OCI chart package to GitHub Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.4 # Also update in lint-and-test.yaml

      - name: Detect changed charts
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          NULL_SHA="0000000000000000000000000000000000000000"
          if [ "${{ github.event_name }}" = "push" ] && [ "$BEFORE_SHA" != "$NULL_SHA" ]; then
            dirs=$(git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" -- charts/ \
              | cut -d/ -f1-2 | sort -u)
          else
            dirs=$(ls -d charts/*/)
          fi
          echo "charts<<EOF" >> "$GITHUB_OUTPUT"
          echo "$dirs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Package changed charts
        env:
          CHANGED_CHARTS: ${{ steps.changed.outputs.charts }}
        run: |
          mkdir -p .cr-release-packages
          while IFS= read -r chart_dir; do
            [ -z "$chart_dir" ] && continue
            if [ -f "${chart_dir}/Chart.yaml" ]; then
              helm package "${chart_dir}" -d .cr-release-packages/
            fi
          done <<< "$CHANGED_CHARTS"

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          shopt -s nullglob
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          for pkg in .cr-release-packages/*.tgz; do
            if [ -z "${pkg:-}" ]; then
              break
            fi
            helm push "${pkg}" "oci://ghcr.io/${REPO}"
          done
