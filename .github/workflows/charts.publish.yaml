name: "[charts] Publish"
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'unique-ag/helm-charts'
    permissions:
      contents: write # to create GitHub releases and tags
      packages: write # to push OCI chart package to GitHub Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.19.4 # Also update in lint-and-test.yaml

      - name: Detect changed charts
        id: changed
        run: |
          latest_tag=$(git describe --tags --abbrev=0 HEAD~ 2>/dev/null \
            || git rev-list --max-parents=0 --first-parent HEAD)
          echo "Latest tag: $latest_tag"
          dirs=$(git diff --find-renames --name-only "$latest_tag" -- charts \
            | cut -d'/' -f1-2 | sort -u)
          echo "charts<<EOF" >> "$GITHUB_OUTPUT"
          echo "$dirs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Package and release charts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_CHARTS: ${{ steps.changed.outputs.charts }}
        run: |
          mkdir -p .cr-release-packages
          while IFS= read -r chart_dir; do
            [ -z "$chart_dir" ] && continue
            [ ! -f "$chart_dir/Chart.yaml" ] && continue

            name=$(yq '.name' "$chart_dir/Chart.yaml")
            version=$(yq '.version' "$chart_dir/Chart.yaml")
            tag="${name}-${version}"

            echo "Packaging $chart_dir ($tag)..."
            helm package "$chart_dir" -d .cr-release-packages/

            # idempotent: immutable releases cannot be modified, skip if already created
            if gh release view "$tag" &>/dev/null; then
              echo "Release $tag already exists, skipping."
              continue
            fi

            prev_tag=$(git tag -l "${name}-*" --sort=-v:refname | head -1)
            release_args=("$tag" --target "$GITHUB_SHA" --title "$tag" --generate-notes)
            if [ -n "$prev_tag" ]; then
              release_args+=(--notes-start-tag "$prev_tag")
            fi

            echo "Creating release $tag..."
            gh release create "${release_args[@]}"
          done <<< "$CHANGED_CHARTS"

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          shopt -s nullglob
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          for pkg in .cr-release-packages/*.tgz; do
            if [ -z "${pkg:-}" ]; then
              break
            fi
            name=$(helm show chart "$pkg" | yq '.name')
            version=$(helm show chart "$pkg" | yq '.version')
            # idempotent: skip if the OCI artifact already exists in GHCR
            if helm show chart "oci://ghcr.io/${REPO}/${name}" --version "$version" &>/dev/null; then
              echo "OCI artifact ${name}:${version} already exists, skipping."
              continue
            fi
            helm push "${pkg}" "oci://ghcr.io/${REPO}"
          done
